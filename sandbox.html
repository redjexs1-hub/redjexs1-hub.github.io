<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Конструктор схем · Arduino Learn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400&family=Unbounded:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#161616;
  --border:#1e1e1e;--border2:#2a2a2a;
  --text:#e8e8e8;--muted:#555;--muted2:#888;
  --accent:#c8ff00;--accent-d:rgba(200,255,0,.08);
  --font-head:'Unbounded',sans-serif;
  --font-mono:'DM Mono',monospace;
  --red:#ff5252;--blue:#4d9fff;--orange:#ff9500;
  --green:#30d060;--white:#e8e8e8;--magenta:#ff44cc;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-mono);font-size:13px;overflow:hidden}

/* ── Layout ──────────────────────────────────── */
#sandbox{display:flex;flex-direction:column;height:100vh}

/* ── Header ──────────────────────────────────── */
.sb-hdr{
  display:flex;align-items:center;gap:8px;padding:9px 14px;
  border-bottom:1px solid var(--border);background:var(--bg2);
  flex-shrink:0;flex-wrap:wrap;min-height:48px;
}
.sb-title{
  font-family:var(--font-head);font-size:10px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--accent);flex:1;white-space:nowrap;
}
.hdr-btn{
  padding:5px 12px;border:1px solid var(--border2);background:none;
  color:var(--muted2);border-radius:20px;font-size:10px;cursor:pointer;
  font-family:var(--font-mono);letter-spacing:.06em;transition:all .18s;
  white-space:nowrap;
}
.hdr-btn:hover{border-color:var(--border2);color:var(--text)}
.hdr-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-d)}
.hdr-btn.danger:hover{border-color:var(--red);color:var(--red)}
.hdr-btn.primary{border-color:var(--accent);color:#000;background:var(--accent);font-weight:bold}
.hdr-btn.primary:hover{background:#d6ff1a}
.hdr-btn:disabled{opacity:.45;pointer-events:none}

/* Wire color swatches */
.wire-swatch{
  width:16px;height:16px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:border-color .15s;flex-shrink:0;
}
.wire-swatch.sel{border-color:var(--text)}
.wire-label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}

/* ── Main body ───────────────────────────────── */
.sb-main{display:flex;flex:1;overflow:hidden}

/* ── Palette ─────────────────────────────────── */
.sb-palette{
  width:108px;flex-shrink:0;border-right:1px solid var(--border);
  background:var(--bg2);overflow-y:auto;padding:6px;
  display:flex;flex-direction:column;gap:3px;scrollbar-width:none;
}
.sb-palette::-webkit-scrollbar{display:none}
.pal-sec{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);padding:8px 4px 2px}
.pal-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:7px 4px;border:1px solid var(--border);border-radius:8px;
  cursor:pointer;transition:all .18s;text-align:center;
  font-size:9px;color:var(--muted2);user-select:none;-webkit-user-select:none;
}
.pal-item:hover{border-color:var(--border2);background:var(--bg3);color:var(--text)}
.pal-item:active{transform:scale(.95)}

/* ── Canvas ──────────────────────────────────── */
.sb-canvas{
  flex:1;position:relative;overflow:hidden;
  background-image:
    radial-gradient(circle at 50% 30%,rgba(200,255,0,.012) 0%,transparent 60%),
    linear-gradient(var(--border) 1px,transparent 1px),
    linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:auto,28px 28px,28px 28px;
  cursor:default;
}
.sb-canvas.wire-mode{cursor:crosshair}
#circuit-svg{width:100%;height:100%;overflow:visible}

/* ── SVG component styles ────────────────────── */
.comp-g{cursor:move;user-select:none;-webkit-user-select:none}
.comp-g.wire-mode{cursor:default}
.comp-sel-ring{fill:none;stroke:var(--accent);stroke-width:1.5;stroke-dasharray:4 3;opacity:0;pointer-events:none}
.comp-g.selected .comp-sel-ring{opacity:.7}

.pin-hit{fill:transparent;stroke:transparent;cursor:pointer;r:7}
.pin-dot{pointer-events:none;r:3.5;fill:var(--border2);stroke:var(--muted);stroke-width:1;transition:all .12s}
.pin-ring{pointer-events:none;r:7;fill:none;stroke:transparent;stroke-width:1.5;transition:all .12s}
.comp-g .pin-hit:hover ~ .pin-ring,
.pin-hit:focus ~ .pin-ring{stroke:var(--accent);stroke-opacity:.5}
.pin-dot.hi{fill:var(--accent);stroke:var(--accent);r:4}
.pin-ring.hi{stroke:rgba(200,255,0,.4);stroke-width:7}

.del-btn{cursor:pointer;opacity:0;transition:opacity .15s}
.comp-g:hover .del-btn{opacity:1}

.wire-path{stroke-width:1.8;fill:none;stroke-linecap:round;cursor:pointer;transition:stroke-width .1s,opacity .1s}
.wire-path:hover{stroke-width:3;opacity:1!important}
.wire-preview{fill:none;stroke-linecap:round;stroke-dasharray:6 4;pointer-events:none;opacity:.55}

/* ── Task banner ─────────────────────────────── */
.sb-task{
  padding:8px 14px;
  background:rgba(200,255,0,.05);
  border-bottom:1px solid rgba(200,255,0,.12);
  display:flex;align-items:flex-start;gap:10px;
  font-size:11px;line-height:1.55;flex-shrink:0;
}
.sb-task-icon{
  width:22px;height:22px;border-radius:6px;
  background:rgba(200,255,0,.12);border:1px solid rgba(200,255,0,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:bold;color:#c8ff00;flex-shrink:0;margin-top:1px;
}
.sb-task-label{font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:rgba(200,255,0,.5);margin-bottom:2px;}
.sb-task-text{color:#c0c0c0;}
.sb-task-text strong{color:#e8e8e8;}
.sb-task-close{
  margin-left:auto;background:none;border:none;color:var(--muted);
  font-size:14px;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0;
  transition:color .15s;
}
.sb-task-close:hover{color:var(--text)}
.sb-code{
  height:42%;border-top:1px solid var(--border);
  background:var(--bg2);display:flex;flex-direction:column;flex-shrink:0;
}
.code-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 14px;border-bottom:1px solid var(--border);
  font-size:9px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);flex-shrink:0;gap:8px;flex-wrap:wrap;
}
.code-hdr-r{display:flex;align-items:center;gap:8px}
#code-editor{
  flex:1;background:var(--bg);color:#c9d1d9;border:none;outline:none;
  font-family:var(--font-mono);font-size:12px;line-height:1.7;
  padding:12px 14px;resize:none;tab-size:2;overflow-y:auto;
}
#code-editor::-webkit-scrollbar{width:3px}
#code-editor::-webkit-scrollbar-thumb{background:var(--border2)}
#check-result{
  padding:10px 14px;font-size:12px;line-height:1.65;
  border-top:1px solid var(--border);color:var(--text);
  max-height:130px;overflow-y:auto;background:var(--bg3);display:none;
}
#check-result.loading{color:var(--muted2)}
#check-result.ok{border-left:3px solid var(--accent);padding-left:11px}
#check-result.warn{border-left:3px solid var(--orange);padding-left:11px}
#check-result.err{border-left:3px solid var(--red);padding-left:11px}
</style>
</head>

<script>
// ══════════════════════════════════════════════
//  COMPONENT DEFINITIONS
// ══════════════════════════════════════════════
const DEFS = {
  arduino:{
    label:'Arduino UNO', w:90, h:130,
    pins:[
      {id:'5V',   x:0,  y:25,  lbl:'5V',   grp:'power'},
      {id:'3V3',  x:0,  y:37,  lbl:'3.3V', grp:'power'},
      {id:'GND1', x:0,  y:49,  lbl:'GND',  grp:'gnd'},
      {id:'GND2', x:0,  y:61,  lbl:'GND',  grp:'gnd'},
      {id:'A0',   x:0,  y:73,  lbl:'A0',   grp:'analog'},
      {id:'A1',   x:0,  y:85,  lbl:'A1',   grp:'analog'},
      {id:'A2',   x:0,  y:97,  lbl:'A2',   grp:'analog'},
      {id:'A3',   x:0,  y:109, lbl:'A3',   grp:'analog'},
      {id:'D13',  x:90, y:25,  lbl:'D13',  grp:'digital'},
      {id:'D12',  x:90, y:37,  lbl:'D12',  grp:'digital'},
      {id:'D11',  x:90, y:49,  lbl:'D11~', grp:'pwm'},
      {id:'D10',  x:90, y:61,  lbl:'D10~', grp:'pwm'},
      {id:'D9',   x:90, y:73,  lbl:'D9~',  grp:'pwm'},
      {id:'D8',   x:90, y:85,  lbl:'D8',   grp:'digital'},
      {id:'D7',   x:90, y:97,  lbl:'D7',   grp:'digital'},
      {id:'D6',   x:90, y:109, lbl:'D6~',  grp:'pwm'},
    ],
    body:(c)=>`
      <rect width="90" height="130" rx="5" fill="#1b6e2e" stroke="#2d9e45" stroke-width="1.5"/>
      <rect x="4" y="4" width="82" height="122" rx="3" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="1"/>
      <rect x="2" y="97" width="18" height="27" rx="2" fill="#111"/>

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
const state = {
  comps: new Map(),
  wires: [],
  wireMode: false,
  selPin: null,      // {cid, pid}
  selComp: null,
  dragging: null,    // {cid, ox, oy}
  color: '#c8ff00',
  nextId: 1
};

const WIRE_COLORS = [
  {c:'#c8ff00',n:'Зел'},
  {c:'#ff5252',n:'Кра'},
  {c:'#4d9fff',n:'Син'},
  {c:'#ff9500',n:'Ора'},
  {c:'#ffffff',n:'Бел'},
  {c:'#ff44cc',n:'Роз'},
];

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
const svg = document.getElementById('circuit-svg');
const wiresLayer = document.getElementById('wires-layer');
const compsLayer = document.getElementById('comps-layer');
const previewLayer = document.getElementById('preview-layer');

// Build color swatches
const swatchRow = document.getElementById('color-swatches');
WIRE_COLORS.forEach(({c,n},i)=>{
  const d=document.createElement('div');
  d.className='wire-swatch'+(i===0?' sel':'');
  d.style.background=c;
  d.title=n;
  d.onclick=()=>{
    state.color=c;
    swatchRow.querySelectorAll('.wire-swatch').forEach(s=>s.classList.remove('sel'));
    d.classList.add('sel');
  };
  swatchRow.appendChild(d);
});

// Tab key support in code editor
document.getElementById('code-editor').addEventListener('keydown',e=>{
  if(e.key==='Tab'){
    e.preventDefault();
    const ta=e.target;
    const s=ta.selectionStart,en=ta.selectionEnd;
    ta.value=ta.value.substring(0,s)+'  '+ta.value.substring(en);
    ta.selectionStart=ta.selectionEnd=s+2;
  }
});

// ══════════════════════════════════════════════
//  COORDINATE HELPERS
// ══════════════════════════════════════════════
function svgPt(e){
  const r=svg.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  return {x:cx-r.left, y:cy-r.top};
}

function pinWorld(cid,pid){
  const c=state.comps.get(cid);
  const pin=DEFS[c.type].pins.find(p=>p.id===pid);
  return {x:c.x+pin.x, y:c.y+pin.y};
}

// ══════════════════════════════════════════════
//  RENDER COMPONENT
// ══════════════════════════════════════════════
function renderComp(c){
  let el=document.getElementById('c_'+c.id);
  if(!el){
    el=document.createElementNS('http://www.w3.org/2000/svg','g');
    el.id='c_'+c.id;
    el.classList.add('comp-g');
    el.setAttribute('data-cid',c.id);
    compsLayer.appendChild(el);
  }
  const def=DEFS[c.type];
  el.setAttribute('transform',`translate(${c.x},${c.y})`);
  if(state.wireMode) el.classList.add('wire-mode');
  else el.classList.remove('wire-mode');

  const bodyHtml=typeof def.body==='function'?def.body(c.color||'red'):'';
  const pinsHtml=def.pins.map(p=>`
    <g class="pin-group" data-cid="${c.id}" data-pid="${p.id}">
      <circle class="pin-hit" cx="${p.x}" cy="${p.y}" r="7" data-cid="${c.id}" data-pid="${p.id}"/>
      <circle class="pin-dot" id="pd_${c.id}_${p.id}" cx="${p.x}" cy="${p.y}" r="3.5"/>
      <circle class="pin-ring" id="pr_${c.id}_${p.id}" cx="${p.x}" cy="${p.y}" r="7"/>
    </g>
  `).join('');

  // Delete button (×)
  const delHtml=`<g class="del-btn" onclick="deleteComp('${c.id}')">
    <circle cx="${def.w+8}" cy="-8" r="7" fill="#1a1a1a" stroke="#333"/>
    <text x="${def.w+8}" y="-5" font-size="10" fill="#888" text-anchor="middle" font-family="sans-serif">×</text>
  </g>`;

  // Selection ring
  const selHtml=`<rect class="comp-sel-ring" x="-4" y="-4" width="${def.w+8}" height="${def.h+8}" rx="6" id="sr_${c.id}"/>`;

  el.innerHTML=bodyHtml+pinsHtml+delHtml+selHtml;
  if(state.selComp===c.id) el.classList.add('selected');
  else el.classList.remove('selected');
}

// ══════════════════════════════════════════════
//  RENDER WIRE
// ══════════════════════════════════════════════
function wirePath(x1,y1,x2,y2){
  const mx=(x1+x2)/2;
  const my=(y1+y2)/2;
  // Smooth bezier route
  const dx=Math.abs(x2-x1),dy=Math.abs(y2-y1);
  if(dx>dy*1.5) return `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`;
  if(dy>dx*1.5) return `M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`;
  return `M${x1},${y1} C${mx},${y1} ${x2},${my} ${x2},${y2}`;
}

function renderWire(w){
  let el=document.getElementById('w_'+w.id);
  if(!el){
    el=document.createElementNS('http://www.w3.org/2000/svg','path');
    el.id='w_'+w.id;
    el.classList.add('wire-path');
    el.setAttribute('data-wid',w.id);
    wiresLayer.appendChild(el);
  }
  const a=pinWorld(w.from.cid,w.from.pid);
  const b=pinWorld(w.to.cid,w.to.pid);
  el.setAttribute('d',wirePath(a.x,a.y,b.x,b.y));
  el.style.stroke=w.color||'#c8ff00';
  el.style.opacity='.75';
}

function rerenderAll(){
  state.comps.forEach(c=>renderComp(c));
  state.wires.forEach(w=>renderWire(w));
}

// ══════════════════════════════════════════════
//  ADD COMPONENT
// ══════════════════════════════════════════════
function addComp(type,color){
  if(!DEFS[type]) return;
  const id=state.nextId++;
  const cx=svg.getBoundingClientRect();
  // Offset each new component so they don't stack
  const off=(state.comps.size%5)*30;
  const c={
    id,type,color,
    x: Math.max(20, cx.width/2-50+off),
    y: Math.max(20, cx.height/2-65+off),
  };
  state.comps.set(id,c);
  renderComp(c);
}

// ══════════════════════════════════════════════
//  DELETE COMPONENT
// ══════════════════════════════════════════════
function deleteComp(id){
  id=parseInt(id);
  const el=document.getElementById('c_'+id);
  if(el) el.remove();
  // Remove connected wires
  state.wires=state.wires.filter(w=>{
    if(w.from.cid===id||w.to.cid===id){
      const el=document.getElementById('w_'+w.id);
      if(el) el.remove();
      return false;
    }
    return true;
  });
  state.comps.delete(id);
  if(state.selComp===id) state.selComp=null;
  if(state.selPin?.cid===id) clearPinSel();
}

// ══════════════════════════════════════════════
//  WIRE MODE
// ══════════════════════════════════════════════
function toggleWireMode(){
  state.wireMode=!state.wireMode;
  const btn=document.getElementById('wire-btn');
  btn.classList.toggle('active',state.wireMode);
  btn.textContent=state.wireMode?'● Провода':'○ Провода';
  document.getElementById('canvas-wrap').classList.toggle('wire-mode',state.wireMode);
  compsLayer.querySelectorAll('.comp-g').forEach(g=>
    g.classList.toggle('wire-mode',state.wireMode)
  );
  if(!state.wireMode) clearPinSel();
}

function clearPinSel(){
  if(state.selPin){
    const {cid,pid}=state.selPin;
    const pd=document.getElementById(`pd_${cid}_${pid}`);
    const pr=document.getElementById(`pr_${cid}_${pid}`);
    if(pd) pd.classList.remove('hi');
    if(pr) pr.classList.remove('hi');
  }
  state.selPin=null;
  previewLayer.innerHTML='';
}

// ══════════════════════════════════════════════
//  EVENTS
// ══════════════════════════════════════════════
// Wire preview line tracking
svg.addEventListener('pointermove',e=>{
  if(!state.selPin) return;
  const pt=svgPt(e);
  const a=pinWorld(state.selPin.cid,state.selPin.pid);
  previewLayer.innerHTML=`<path class="wire-preview" stroke="${state.color}" d="${wirePath(a.x,a.y,pt.x,pt.y)}"/>`;
});

svg.addEventListener('pointerdown',e=>{
  const pinHit=e.target.closest('[data-pid]');
  const compG=e.target.closest('[data-cid]');
  const wireEl=e.target.closest('[data-wid]');

  // Delete wire on click
  if(wireEl && !state.wireMode && !pinHit){
    const wid=parseInt(wireEl.getAttribute('data-wid'));
    wireEl.remove();
    state.wires=state.wires.filter(w=>w.id!==wid);
    e.stopPropagation(); return;
  }

  if(state.wireMode && pinHit){
    e.stopPropagation();
    const cid=parseInt(pinHit.getAttribute('data-cid'));
    const pid=pinHit.getAttribute('data-pid');
    if(!state.selPin){
      // First pin
      state.selPin={cid,pid};
      const pd=document.getElementById(`pd_${cid}_${pid}`);
      const pr=document.getElementById(`pr_${cid}_${pid}`);
      if(pd) pd.classList.add('hi');
      if(pr) pr.classList.add('hi');
    } else {
      // Second pin — create wire
      const from=state.selPin;
      if(from.cid===cid && from.pid===pid){ clearPinSel(); return; }
      // Check duplicate
      const dup=state.wires.find(w=>
        (w.from.cid===from.cid&&w.from.pid===from.pid&&w.to.cid===cid&&w.to.pid===pid)||
        (w.to.cid===from.cid&&w.to.pid===from.pid&&w.from.cid===cid&&w.from.pid===pid)
      );
      if(!dup){
        const w={id:state.nextId++,from:{cid:from.cid,pid:from.pid},to:{cid,pid},color:state.color};
        state.wires.push(w);
        renderWire(w);
      }
      clearPinSel();
    }
    return;
  }

  // Component drag
  if(!state.wireMode && compG && !pinHit){
    const cid=parseInt(compG.getAttribute('data-cid'));
    if(!cid) return;
    const c=state.comps.get(cid);
    if(!c) return;
    const pt=svgPt(e);
    state.dragging={cid,ox:pt.x-c.x,oy:pt.y-c.y};
    state.selComp=cid;
    rerenderAll();
    svg.setPointerCapture(e.pointerId);
    e.stopPropagation();
  } else if(!compG){
    state.selComp=null;
    rerenderAll();
  }
});

svg.addEventListener('pointermove',e=>{
  if(!state.dragging) return;
  const {cid,ox,oy}=state.dragging;
  const c=state.comps.get(cid);
  if(!c) return;
  const pt=svgPt(e);
  c.x=Math.max(0,pt.x-ox);
  c.y=Math.max(0,pt.y-oy);
  renderComp(c);
  // Re-render wires connected to this comp
  state.wires.filter(w=>w.from.cid===cid||w.to.cid===cid).forEach(w=>renderWire(w));
});

svg.addEventListener('pointerup',()=>{ state.dragging=null; });

// ══════════════════════════════════════════════
//  CLEAR
// ══════════════════════════════════════════════
function clearAll(){
  if(state.comps.size===0 && state.wires.length===0) return;
  if(!confirm('Очистить всю схему?')) return;
  wiresLayer.innerHTML='';
  compsLayer.innerHTML='';
  previewLayer.innerHTML='';
  state.comps.clear();
  state.wires=[];
  state.selPin=null;
  state.selComp=null;
  state.dragging=null;
  clearPinSel();
}

// ══════════════════════════════════════════════
//  CIRCUIT DESCRIPTION (for AI prompt)
// ══════════════════════════════════════════════
function describeCircuit(){
  const comps=[...state.comps.values()].map(c=>{
    const d=DEFS[c.type];
    return `• ${d.label}${c.color?` (${c.color})`:''}  [ID:${c.id}]`;
  }).join('\n')||'Нет компонентов';

  const wires=state.wires.map(w=>{
    const fc=state.comps.get(w.from.cid), tc=state.comps.get(w.to.cid);
    if(!fc||!tc) return null;
    const fd=DEFS[fc.type], td=DEFS[tc.type];
    const fp=fd.pins.find(p=>p.id===w.from.pid);
    const tp=td.pins.find(p=>p.id===w.to.pid);
    return `• ${fd.label}[ID:${w.from.cid}] вывод «${fp?.lbl||w.from.pid}»  →  ${td.label}[ID:${w.to.cid}] вывод «${tp?.lbl||w.to.pid}»`;
  }).filter(Boolean).join('\n')||'Нет соединений';

  return `КОМПОНЕНТЫ:\n${comps}\n\nСОЕДИНЕНИЯ:\n${wires}`;
}
