<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Arduino Learn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/nav.css">
  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
</head>
<body>

  <div id="app">
    <div id="page-home" class="page active"></div>
    <div id="page-lesson" class="page"></div>
  </div>

  <!-- Navigation Island -->
  <nav class="navigation-island">
    <div class="nav-icons">
      <div class="nav-indicator"></div>

      <button class="nav-island-btn active" data-page="home" aria-label="Главная">
        <svg viewBox="0 0 24 24">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </button>

      <button class="nav-island-btn" data-page="topics" aria-label="Уроки">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
        </svg>
      </button>

      <button class="nav-island-btn" data-page="progress" aria-label="Прогресс">
        <svg viewBox="0 0 24 24">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6"  y1="20" x2="6"  y2="14"/>
        </svg>
      </button>


    </div>

    <div class="profile-circle" role="button" tabindex="0" aria-label="Профиль">
      <img src="icons/avatar.png" alt="Avatar" onerror="this.style.display='none'">
    </div>
  </nav>

  <!-- SVG distortion filter for nav blur effect -->
  <svg style="display:none" aria-hidden="true">
    <defs>
      <filter id="lg-dist" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.012 0.012" numOctaves="1" seed="22" result="noise"/>
        <feGaussianBlur in="noise" stdDeviation="10" result="blurred"/>
        <feDisplacementMap in="SourceGraphic" in2="blurred" scale="40" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/app.js"></script>
  <script src="js/nav.js"></script>

</body>
</html>
